<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{subject}}</title>
</head>
<body style="margin:0;padding:0;background:#f3f4f6;font-family:'Segoe UI',Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f3f4f6;padding:40px 0;">
  <tr>
    <td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

        <!-- Header -->
        <tr>
          <td style="background:#1e3a8a;padding:28px 48px;text-align:center;">
            <h1 style="color:#ffffff;font-size:22px;font-weight:800;margin:0;">LandingPageSaaS</h1>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:40px 48px;color:#1f2937;">
            <h2 style="font-size:20px;font-weight:700;margin:0 0 16px;">{{heading}}</h2>
            <p style="font-size:15px;line-height:1.7;color:#4b5563;margin:0 0 24px;">{{body}}</p>

            {{#if cta_url}}
            <table cellpadding="0" cellspacing="0" style="margin:0 0 32px;">
              <tr>
                <td style="background:#2563eb;border-radius:10px;">
                  <a href="{{cta_url}}" style="display:inline-block;padding:13px 28px;color:#ffffff;font-weight:700;font-size:14px;text-decoration:none;">{{cta_label}}</a>
                </td>
              </tr>
            </table>
            {{/if}}
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="background:#f9fafb;padding:24px 48px;border-top:1px solid #e5e7eb;text-align:center;">
            <p style="font-size:12px;color:#9ca3af;margin:0;">
              © {{year}} LandingPageSaaS · <a href="{{unsubscribe_url}}" style="color:#6b7280;">Unsubscribe</a>
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
